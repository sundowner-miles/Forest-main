<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>森林 · 公园详情</title>
  <link rel="stylesheet" href="../forest.css">
</head>
<body>
  <site-navbar></site-navbar>

  <div id="seasonal-particles" aria-hidden="true"></div>
  <div id="leaf-rain" class="hidden" aria-hidden="true"></div>

  <main id="app"></main>
  <div id="toast-container" class="toast-container"></div>

  <!-- Park tip modal (reused) -->
  <div id="park-tip-modal" class="modal hidden" onclick="handleModalOverlayClick(event,'park-tip-modal')">
    <div class="modal-inner">
      <h3>分享你的发现</h3>
      <form id="park-tip-form">
        <input id="tip-user" placeholder="你的昵称" required />
        <textarea id="tip-content" placeholder="这里写下你的发现" required></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button type="button" class="forest-btn" onclick="closeModal('park-tip-modal')">取消</button>
          <button type="submit" class="forest-btn forest-btn-primary">提交</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../data.js"></script>
  <script src="../components/navbar.js"></script>
  <script src="../app.js"></script>
</body>
</html>
