<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机逛 - 一起去森林浴吧</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Gaegu&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    // 抢在页面渲染前，提前把主题 class 加到 html 或 body 上，彻底消除闪烁
    (function() {
      const themeClasses = ['theme-spring', 'theme-summer', 'theme-autumn', 'theme-winter'];
      const savedThemeIdx = localStorage.getItem('forest-theme') ? parseInt(localStorage.getItem('forest-theme')) : 0;
      // 直接把 class 塞给最外层的 <html> 节点
      document.documentElement.className = themeClasses[savedThemeIdx];
    })();
  </script>
  <style>
    /* ==========================================
       沉浸式模式专属样式
       ========================================== */
    body, html { overflow: hidden; margin: 0; padding: 0; background: #000; }

    #nav-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 999; }
    
    .navbar {
      position: fixed !important; top: 0; left: 0; width: 100%; z-index: 1000;
      transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      box-sizing: border-box;
    }
    
    #nav-trigger:hover + .navbar, .navbar:hover { transform: translateY(0); }

    .window-frame {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      border-radius: 0 !important; border: none !important; box-shadow: none !important;
      z-index: 0; background: #000;
    }

    .fullscreen-btn {
      position: fixed; bottom: 36px; right: 36px; width: 56px; height: 56px;
      border-radius: 50%; background: rgba(0, 0, 0, 0.35); color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .fullscreen-btn:hover { background: rgba(0, 0, 0, 0.65); transform: scale(1.1); }
    .fab-btn { left: 36px !important; right: auto !important; z-index: 100; }

    /* ==========================================
       新增：侧边分类筛选栏样式
       ========================================== */
    .filter-panel {
      position: fixed;
      right: 0;
      top: 50%;
      /* 默认折叠状态：向右平移自身宽度，减去把手的24px以露出把手 */
      transform: translateY(-50%) translateX(calc(100% - 24px)); 
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .filter-panel.open {
      transform: translateY(-50%) translateX(0); /* 展开状态 */
    }
    
    .filter-toggle {
      width: 24px;
      height: 80px;
      background: rgba(30, 30, 30, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-right: none;
      border-radius: 12px 0 0 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      transition: background 0.2s;
    }
    .filter-toggle:hover {
      background: rgba(60, 60, 60, 0.7);
      color: #fff;
    }

    .filter-content {
      background: rgba(30, 30, 30, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-right: none;
      border-radius: 20px 0 0 20px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .filter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 6px;
    }
    .filter-item:hover, .filter-item.active {
      color: #fff;
      transform: scale(1.08);
    }
    .filter-item .f-icon { 
      width: 32px;  /* 如果觉得图片太小，可以把这里和下面的 height 改大，比如 32px */
      height: 32px;
      object-fit: contain; /* 保证图片等比例缩放不拉伸 */
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); /* 保留原有的好看的悬浮阴影 */
      transition: transform 0.2s ease;
    }
    .filter-item .f-text { 
      font-family: 'Quicksand', sans-serif; 
      font-size: 10px; 
      font-weight: 700; 
      letter-spacing: 1px; 
      text-transform: uppercase;
    }
    /* ==========================================
       白噪音控制面板样式
       ========================================== */
    .sound-control {
      position: fixed; bottom: 36px; right: 104px; /* 定位在全屏按钮左边 */
      z-index: 100; display: flex; flex-direction: column; align-items: center;
    }
    .sound-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.35); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; font-size: 22px;
    }
    .sound-btn:hover { background: rgba(0, 0, 0, 0.65); transform: scale(1.1); }
    
    .sound-menu {
      position: absolute; bottom: 70px;
      background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 8px 0;
      width: 160px; display: none; flex-direction: column; transform-origin: bottom right;
      animation: menuPop 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .sound-menu.open { display: flex; }
    
    @keyframes menuPop {
      from { opacity: 0; transform: scale(0.8) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .sound-list-item {
      padding: 12px 18px; color: rgba(255,255,255,0.7); font-family: 'Quicksand', sans-serif; font-size: 14px;
      cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .sound-list-item:hover, .sound-list-item.active { color: #fff; background: rgba(255,255,255,0.1); }
    .sound-list-item .s-label { display: flex; align-items: center; gap: 10px; }
    
    /* 播放时的动态跳动音轨 */
    .playing-bars { display: none; gap: 3px; height: 12px; align-items: flex-end; }
    .sound-list-item.active .playing-bars { display: flex; }
    .bar { width: 3px; background: var(--fg); border-radius: 2px; animation: bounce 1s infinite alternate; }
    .bar:nth-child(2) { animation-delay: 0.2s; }
    .bar:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { from { height: 3px; } to { height: 12px; } }

    /* ==========================================
   底部切换场景按钮样式 (毛玻璃风格)
   ========================================== */
    .next-scene-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;

      background: rgba(30, 30, 30, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      padding: 14px 32px;
      border-radius: 40px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .next-scene-btn:hover {
      background: rgba(60, 60, 60, 0.7);
      color: #fff;
      /* transform: translateX(-50%) scale(1.05); */
      border-color: rgba(255, 255, 255, 0.3);
    }
  </style>

  <script>
    // === 修复滚动条消失导致的元素偏移问题 ===
    function getScrollbarWidth() {
      // 创建一个带有滚动条的隐藏 div 来测量真实的滚动条宽度
      const scrollDiv = document.createElement('div');
      scrollDiv.style.cssText = 'width: 99px; height: 99px; overflow: scroll; position: absolute; top: -9999px;';
      document.body.appendChild(scrollDiv);
      const scrollbarWidth = scrollDiv.offsetWidth - scrollDiv.clientWidth;
      document.body.removeChild(scrollDiv);
      return scrollbarWidth;
    }

    const scrollbarWidth = getScrollbarWidth();

    if (scrollbarWidth > 0) { // 如果存在实体滚动条 (如 Windows 系统)
      // 1. 补偿导航栏的右侧内边距
      document.querySelector('.navbar').style.paddingRight = `calc(clamp(20px, 5vw, 40px) + ${scrollbarWidth}px)`;
      
      // 2. 为了追求完美，把右上角的地点标签、右侧折叠面板、右下角按钮也往左推回原位
      // document.getElementById('window-location').style.right = `${24 + scrollbarWidth}px`;
      // document.querySelector('.filter-panel').style.right = `${scrollbarWidth}px`;
      // document.querySelector('.sound-control').style.right = `${104 + scrollbarWidth}px`;
      // document.querySelector('.fullscreen-btn').style.right = `${36 + scrollbarWidth}px`;
    }
    function shuffleArray(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    
    // 当前正在使用的渲染队列
    let currentFilteredScenes = [...WINDOW_SCENES];
    let sceneQueue = shuffleArray(currentFilteredScenes);
    let currentIndex = 0;

    const imgEl = document.getElementById('window-img');
    const blurImg = document.getElementById('blur-img');
    const videoEl = document.getElementById('window-video'); 
    const blurVideo = document.getElementById('blur-video');
    
    const locationEl = document.getElementById('window-location');
    const captionEl = document.getElementById('window-caption');
    const userEl = document.getElementById('window-user');
    
    const modalEl = document.getElementById('submit-modal');
    const formView = document.getElementById('submit-form');
    const successView = document.getElementById('modal-success-view');
    const audioEl = document.getElementById('bg-audio');
    let isMuted = false;
    

    // === 白噪音悬浮展开逻辑 (优化版：增加延迟容错) ===
        const soundControl = document.querySelector('.sound-control');
        const soundMenu = document.getElementById('sound-menu');
        let soundMenuTimeout; // 定义一个计时器变量

        if (soundControl && soundMenu) {
          // 鼠标移入容器：立刻清除收起计时器，并展开面板
          soundControl.addEventListener('mouseenter', () => {
            clearTimeout(soundMenuTimeout); 
            soundMenu.classList.add('open');
          });

          // 鼠标移出容器：不立刻收起，而是设置一个 500ms 的延迟
          soundControl.addEventListener('mouseleave', () => {
            soundMenuTimeout = setTimeout(() => {
              soundMenu.classList.remove('open');
            }, 200); // 200 毫秒缓冲时间，可以根据手感调整
          });
        }

    window.selectSound = function(idx, el) {
      document.querySelectorAll('.sound-list-item').forEach(item => item.classList.remove('active'));
      el.classList.add('active');
      isMuted = false;
      document.getElementById('sound-btn-icon').innerText = '🔊';
      
      // 修改这里：从 data.js 获取 url
      audioEl.src = WHITE_NOISES[idx].url; 
      audioEl.volume = 0.6;
      audioEl.play().catch(e => console.log("播放需要用户交互", e));
    };

    // 静音处理
    window.toggleMute = function() {
      document.querySelectorAll('.sound-list-item').forEach(item => item.classList.remove('active'));
      isMuted = true;
      audioEl.pause();
      document.getElementById('sound-btn-icon').innerText = '🔇';
      document.getElementById('sound-menu').classList.remove('open');
    };

    function initAutoPlay() {
      // 修改这里
      audioEl.src = WHITE_NOISES[0].url; 
      audioEl.volume = 0.6;
      
      let playPromise = audioEl.play();
      // 尝试自动播放，若失败则监听页面点击
      audioEl.play().catch(() => {
        document.body.addEventListener('click', function autoStart() {
          if(!isMuted) audioEl.play();
          document.body.removeEventListener('click', autoStart);
        }, { once: true });
      });
    }

    // === 渲染核心逻辑 ===
    function renderCurrentScene() {
      const scene = sceneQueue[currentIndex % sceneQueue.length];
      locationEl.innerHTML = `📍 ${scene.location}`;
      captionEl.innerHTML = `"${scene.caption}"`;
      userEl.innerHTML = `— ${scene.user}`;
      
      const mediaUrl = scene.url;
      const isVideoCurrent = mediaUrl.toLowerCase().endsWith('.mp4');

      if (isVideoCurrent) {
        imgEl.style.opacity = 0; blurImg.style.opacity = 0;
        
        videoEl.src = mediaUrl; blurVideo.src = mediaUrl;
        videoEl.load(); blurVideo.load();
        
        videoEl.oncanplay = () => {
          const isVerticalMedia = videoEl.videoWidth < videoEl.videoHeight;
          const isLandscapeScreen = window.innerWidth > window.innerHeight;
          
          if (isVerticalMedia && isLandscapeScreen) {
            videoEl.style.objectFit = 'contain';
          } else {
            videoEl.style.objectFit = 'cover';
          }

          videoEl.style.opacity = 1; blurVideo.style.opacity = 1;
          videoEl.play().catch(e => console.log(e));
          blurVideo.play().catch(e => console.log(e));
        };
      } else {
        videoEl.style.opacity = 0; blurVideo.style.opacity = 0;
        setTimeout(() => { videoEl.pause(); blurVideo.pause(); }, 800); 
        
        imgEl.src = mediaUrl; blurImg.src = mediaUrl;
        
        imgEl.onload = () => { 
          const isVerticalMedia = imgEl.naturalWidth < imgEl.naturalHeight;
          const isLandscapeScreen = window.innerWidth > window.innerHeight;
          
          if (isVerticalMedia && isLandscapeScreen) {
            imgEl.style.objectFit = 'contain';
          } else {
            imgEl.style.objectFit = 'cover';
          }
          
          imgEl.style.opacity = 1; blurImg.style.opacity = 1;
        };
      }
    }

    // 切换下一场景
    window.nextScene = function() {
      imgEl.style.opacity = 0; blurImg.style.opacity = 0;
      videoEl.style.opacity = 0; blurVideo.style.opacity = 0;
      setTimeout(() => { currentIndex++; renderCurrentScene(); }, 800);
    };

    // === 侧边栏展开与折叠 ===
    window.toggleFilterPanel = function() {
      const panel = document.getElementById('filter-panel');
      const icon = document.getElementById('filter-toggle-icon');
      if (panel.classList.contains('open')) {
        panel.classList.remove('open');
        icon.innerText = '◀';
      } else {
        panel.classList.add('open');
        icon.innerText = '▶';
      }
    };

    // === 智能筛选逻辑 ===
    window.applyFilter = function(filterTag, el) {
      // 1. 更新 UI 选中状态
      document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
      if(el) el.classList.add('active');

      // 2. 根据标签和文本模糊匹配
      if (filterTag === 'all') {
        currentFilteredScenes = [...WINDOW_SCENES];
      } else {
        currentFilteredScenes = WINDOW_SCENES.filter(scene => {
          // 模糊搜索：根据地点和描述中的关键字进行匹配
          const str = (scene.caption + scene.location).toLowerCase();
          switch(filterTag) {
            case 'spring': return /春|樱|花|草/.test(str);
            case 'summer': return /夏|绿|雨林|树|荷/.test(str);
            case 'autumn': return /秋|枫|红叶|黄/.test(str);
            case 'winter': return /冬|雪|冰|白/.test(str);
            case 'sunny':  return /晴|光|阳|晨|日/.test(str);
            case 'rainy':  return /雨|雾|湿|水|露/.test(str);
            default: return true;
          }
        });

        // 如果该分类下没有素材，进行兜底处理，防止页面黑屏
        if (currentFilteredScenes.length === 0) {
          alert("哎呀，这个分类下暂时没有窗景哦，先看看别的吧~");
          currentFilteredScenes = [...WINDOW_SCENES];
          document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
          document.querySelector('.filter-item[data-tag="all"]').classList.add('active');
        }
      }

      // 3. 重置队列并渲染
      sceneQueue = shuffleArray(currentFilteredScenes);
      currentIndex = 0;
      
      // 先将当前画面淡出
      imgEl.style.opacity = 0; blurImg.style.opacity = 0;
      videoEl.style.opacity = 0; blurVideo.style.opacity = 0;
      
      setTimeout(() => {
        renderCurrentScene();
      }, 800);
    };


    // 模态框及全屏控制
    window.toggleModal = function(show) {
      if (show) { modalEl.style.display = 'flex'; formView.style.display = 'block'; successView.style.display = 'none'; formView.reset(); } 
      else { modalEl.style.display = 'none'; }
    };
    window.handleOverlayClick = function(e) { if (e.target === modalEl) toggleModal(false); };
    window.handleFormSubmit = function(e) { e.preventDefault(); formView.style.display = 'none'; successView.style.display = 'block'; setTimeout(() => toggleModal(false), 1800); };
    window.toggleFullScreen = function() {
      if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => console.log(e)); } 
      else { if (document.exitFullscreen) document.exitFullscreen(); }
    };

    // === 主题与初始化 ===
    const themeClasses = ['theme-spring', 'theme-summer', 'theme-autumn', 'theme-winter'];
    const toggleContainer = document.getElementById('season-toggle-container');

    function renderTheme(idx) {
      // 1. 保存选择到本地
      localStorage.setItem('forest-theme', idx);
      
      // 2. 切换 Body 类名
      document.body.classList.remove(...themeClasses); 
      document.body.classList.add(themeClasses[idx]);
      
      // 3. 动态渲染季节切换按钮（之前就是这里不小心被删掉了）
      if (toggleContainer && typeof SEASONS !== 'undefined') {
        toggleContainer.innerHTML = SEASONS.map((s, i) => `
          <button class="season-btn ${i === idx ? 'active' : ''}" onclick="renderTheme(${i})" style="cursor: pointer;">
            <img src="${s.icon}" alt="${s.label}" style="width: 24px; height: 24px; object-fit: contain;">
          </button>
        `).join('');
      }
    }

    // 初始化读取本地缓存主题
    const currentThemeIdx = localStorage.getItem('forest-theme') ? parseInt(localStorage.getItem('forest-theme')) : 0;
    renderTheme(currentThemeIdx);
    
    // 初始化调用，让页面一进来就显示内容
    renderCurrentScene();
    initAutoPlay(); // 如果你有加白噪音，记得保留这行  
  </script>
</body>
</html>
