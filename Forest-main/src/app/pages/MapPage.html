<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去哪儿逛 - 一起去森林浴吧</title>
  <link rel="stylesheet" href="../forest.css">
</head>
<body style="margin: 0; padding: 0; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column;">

  <nav class="navbar">
    <a href="Home.html" class="navbar-logo"><span class="navbar-logo-icon">🌿</span>一起去森林浴吧～</a>
    
    <div style="display: flex; align-items: center; gap: 32px;">
      
      <ul class="navbar-links">
        <li><a href="Home.html" class="nav-link">首页</a></li>
        <li><a href="Guide.html" class="nav-link">怎么逛</a></li>
        <li><a href="Random.html" class="nav-link">随机逛</a></li>
        <li><a href="MapPage.html" class="nav-link active">去哪儿逛</a></li>
      </ul>
      
      <div class="navbar-tag">🌳 今日宜·发呆</div>
      
    </div>
  </nav>

  <div class="page-container" style="flex: 1; display: flex; flex-direction: column; max-width: 1400px; padding-bottom: 50px;">
    
    <div class="page-header" style="margin-bottom: 20px;">
      <h1 class="text-large" style="margin: 0;">🗺️ 去哪儿逛</h1>
      <p class="text-body" style="margin: 8px 0 0; opacity: 0.8;">
        点击地图上的标记，探索你附近的森林浴圣地
      </p>
    </div>

    <div class="map-outer" style="flex: 1; min-height: 560px; width: 100%; position: relative; border-radius: 16px; overflow: hidden;" onclick="setActiveId(null)">
      
      <div id="svg-map-layer" style="position: absolute; inset: 0;"></div>
      
      <div id="markers-layer" style="position: absolute; inset: 0; pointer-events: none;"></div>
      <div id="bubble-layer" style="position: absolute; inset: 0; pointer-events: none; z-index: 15;"></div>

      <div style="position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(253,251,247,0.9); border: 1.5px dashed var(--soil-light); border-radius: 16px 4px 16px 4px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(4px); cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 12px rgba(166,138,107,0.05);" onclick="event.stopPropagation()">
        <span style="font-size: 20px;">🧍</span>
        <span class="text-small" style="font-weight: 700; color: var(--fg); margin: 0;">你的位置</span>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-leaves">🌱 🌿 🍃 🌾 🌿 🌱</div>
    <p class="text-small" style="margin: 0; opacity: 0.6;">
      一起去森林浴吧～ · 随时开始，即刻放松
    </p>
  </footer>

  <script src="../data.js"></script>

  <script>
    // ==========================================
    // 1. 渲染静态背景 SVG 地图
    // ==========================================
    const treesData = [
      [100, 80], [140, 95], [120, 120], [80, 110], [160, 60],
      [230, 60], [260, 80], [250, 110], [270, 50],
      [500, 90], [530, 70], [550, 100], [510, 115],
      [780, 80], [810, 60], [820, 95], [850, 75], [760, 65],
      [880, 90], [860, 115],
      [420, 340], [450, 360], [470, 340], [440, 320],
      [620, 310], [650, 295], [670, 320], [640, 340],
      [300, 440], [340, 430], [320, 460], [280, 450],
      [700, 430], [730, 420], [750, 445], [720, 460],
      [1000, 120], [1030, 100], [1050, 130], [1020, 150],
      [1100, 80], [1130, 95], [1120, 65],
      [50, 350], [80, 340], [70, 370], [40, 365],
      [150, 460], [180, 450], [160, 475],
    ];

    const housesData = [
      [480, 280], [820, 320], [1080, 300],
    ];

    const svgMapHTML = `
      <svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block;" preserveAspectRatio="xMidYMid slice">
        <rect width="1200" height="560" fill="#E4EDDA" />
        <path d="M 0,200 Q 100,190 200,210 Q 300,230 400,215 Q 480,200 560,220 Q 640,238 720,225 Q 820,208 920,218 Q 1020,228 1100,210 Q 1150,202 1200,208" fill="none" stroke="#B8D4E8" stroke-width="28" stroke-linecap="round" />
        <path d="M 0,200 Q 100,190 200,210 Q 300,230 400,215 Q 480,200 560,220 Q 640,238 720,225 Q 820,208 920,218 Q 1020,228 1100,210 Q 1150,202 1200,208" fill="none" stroke="#C8DFF0" stroke-width="14" stroke-linecap="round" />
        <path d="M 350,0 Q 360,80 370,140 Q 380,180 400,215" fill="none" stroke="#B8D4E8" stroke-width="12" stroke-linecap="round" />
        <ellipse cx="192" cy="155" rx="90" ry="72" fill="#C8DDB8" opacity="0.7" />
        <ellipse cx="456" cy="305" rx="75" ry="58" fill="#C0D8B0" opacity="0.65" />
        <ellipse cx="744" cy="132" rx="110" ry="80" fill="#CADFBA" opacity="0.7" />
        <ellipse cx="660" cy="360" rx="80" ry="65" fill="#C3DAB2" opacity="0.65" />
        <path d="M 180,0 Q 175,80 185,140 Q 192,155 200,200" fill="none" stroke="#D4C4A0" stroke-width="8" stroke-linecap="round" />
        <path d="M 200,210 Q 280,240 360,275 Q 420,295 456,305" fill="none" stroke="#D4C4A0" stroke-width="8" stroke-linecap="round" />
        <path d="M 400,215 Q 480,190 560,160 Q 640,138 744,132" fill="none" stroke="#D4C4A0" stroke-width="8" stroke-linecap="round" />
        <path d="M 456,305 Q 540,335 610,355 Q 640,360 660,362" fill="none" stroke="#D4C4A0" stroke-width="8" stroke-linecap="round" />
        <path d="M 744,210 Q 720,280 700,330 Q 680,355 660,362" fill="none" stroke="#D4C4A0" stroke-width="8" stroke-linecap="round" />
        <path d="M 0,380 Q 200,370 400,375 Q 600,380 800,372 Q 1000,364 1200,368" fill="none" stroke="#D4C4A0" stroke-width="10" stroke-linecap="round" />
        <path d="M 900,0 Q 910,100 920,200 Q 930,300 920,380" fill="none" stroke="#D4C4A0" stroke-width="8" stroke-linecap="round" />

        ${treesData.map(([cx, cy]) => `
          <g transform="translate(${cx}, ${cy})">
            <circle r="11" fill="#7AB890" opacity="0.6" />
            <circle r="7" fill="#6AA87E" opacity="0.7" cx="0" cy="-2" />
            <rect x="-1.5" y="8" width="3" height="6" fill="#8B7355" opacity="0.6" rx="1" />
          </g>
        `).join('')}

        ${housesData.map(([x, y]) => `
          <g transform="translate(${x}, ${y})">
            <rect x="-12" y="-8" width="24" height="16" fill="#D4C4A0" stroke="#A68A6B" stroke-width="1" rx="1" />
            <polygon points="0,-16 -14,-8 14,-8" fill="#C4A87A" stroke="#A68A6B" stroke-width="1" />
          </g>
        `).join('')}

        <g transform="translate(1130, 490)">
          <circle r="28" fill="rgba(253,251,247,0.8)" stroke="#A68A6B" stroke-width="1.5" stroke-dasharray="3 2" />
          <text x="0" y="-14" text-anchor="middle" font-size="9" fill="#5B8C74" font-family="Quicksand,sans-serif" font-weight="700">N</text>
          <text x="0" y="20" text-anchor="middle" font-size="9" fill="#A68A6B" font-family="Quicksand,sans-serif">S</text>
          <text x="-18" y="4" text-anchor="middle" font-size="9" fill="#A68A6B" font-family="Quicksand,sans-serif">W</text>
          <text x="18" y="4" text-anchor="middle" font-size="9" fill="#A68A6B" font-family="Quicksand,sans-serif">E</text>
          <polygon points="0,-10 3,0 0,3 -3,0" fill="#5B8C74" />
          <polygon points="0,10 3,0 0,-3 -3,0" fill="#A68A6B" opacity="0.5" />
        </g>

        <g transform="translate(60, 520)">
          <rect width="80" height="4" rx="2" fill="#A68A6B" opacity="0.5" />
          <text x="40" y="-5" text-anchor="middle" font-size="10" fill="#A68A6B" font-family="Quicksand,sans-serif" opacity="0.7">5 km</text>
        </g>
      </svg>
    `;
    document.getElementById('svg-map-layer').innerHTML = svgMapHTML;


    // ==========================================
    // 2. 状态交互逻辑
    // ==========================================
    let activeId = null;

    function setActiveId(id) {
      activeId = (activeId === id) ? null : id;
      renderInteractiveLayers();
    }

    function renderInteractiveLayers() {
      // 渲染 Markers (开启 pointer-events 以允许点击)
      const markersHtml = PARKS.map(park => `
        <div class="map-marker ${activeId === park.id ? 'active' : ''}" 
             style="left: ${park.mapX}%; top: ${park.mapY}%; pointer-events: auto;" 
             onclick="event.stopPropagation(); setActiveId(${park.id});" 
             title="${park.name}">
          <div class="marker-pin"><span class="marker-pin-inner">🌲</span></div>
        </div>
      `).join('');
      document.getElementById('markers-layer').innerHTML = markersHtml;

      // 渲染 Info Bubble (开启 pointer-events 以允许点击去看看按钮)
      const activePark = PARKS.find(p => p.id === activeId);
      if (activePark) {
        document.getElementById('bubble-layer').innerHTML = `
          <div class="info-bubble" 
               style="left: ${Math.min(activePark.mapX + 2, 72)}%; top: ${Math.max(activePark.mapY - 38, 5)}%; pointer-events: auto;" 
               onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
              <h4 class="text-medium" style="margin: 0; font-size: 20px;">${activePark.name}</h4>
              <span style="font-size: 18px;">${activePark.seasonIcon}</span>
            </div>
            <p class="text-small" style="margin: 0 0 4px; opacity: 0.75;">📍 距离：${activePark.distance}</p>
            <p class="text-small" style="margin: 0 0 16px; opacity: 0.75;">✨ ${activePark.bestSeason}</p>
            <button class="btn-primary btn-small" style="width: 100%; justify-content: center; font-size: 15px; padding: 6px 12px;" 
                    onclick="window.location.href='ParkDetail.html?id=${activePark.id}'">
              去看看 →
            </button>
          </div>
        `;
      } else {
        document.getElementById('bubble-layer').innerHTML = '';
      }
    }

    // 初始化渲染
    renderInteractiveLayers();
  </script>
</body>
</html>
