<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>怎么逛 - 一起去森林浴吧</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Gaegu&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column;">

<nav class="navbar" style="background: rgba(253, 251, 247, 0.75); backdrop-filter: blur(10px);">
  <a href="Home.html" class="navbar-logo">
    <span class="navbar-logo-icon">🌿</span>一起去森林浴吧～
  </a>

  <div class="navbar-actions">
    <ul class="navbar-links">
      <li><a href="Home.html" class="nav-link">首页</a></li>
      <li><a href="Guide.html" class="nav-link active">怎么逛</a></li>
      <li><a href="Random.html" class="nav-link">随机逛</a></li>
      <li><a href="MapPage.html" class="nav-link">去哪儿逛</a></li>
    </ul>

    <div class="navbar-season" title="轻轻拨动季节">
      <div class="season-toggle" id="season-toggle-container"></div>
    </div>

    <div class="navbar-tag">🌳 今日宜·发呆</div>
  </div>
</nav>

  <div class="page-container" style="flex: 1;">
    <div class="page-header">
      <h1 class="text-large" style="margin: 0;">6 种森林漫步指南</h1>
      <span style="font-size: 28px;">🐌</span>
    </div>

    <p class="text-body" style="margin: 0 0 48px; max-width: 560px; opacity: 0.85;">
      没有门槛，没有装备要求。六种方式，总有一种适合今天的你。
    </p>

    <div id="guide-list" style="display: flex; flex-direction: column; gap: 20px;">
      </div>

    <section style="padding: 60px 0 40px;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 28px;">
        <h2 class="text-medium" style="margin: 0;">🌱 新手注意事项</h2>
      </div>
      <div id="beginner-tips-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;">
        </div>
    </section>

    <div style="text-align: center; padding: 40px 20px 80px; border-top: 2px dashed var(--soil-faint);">
      <div style="font-size: 40px; margin-bottom: 16px;">🌳</div>
      <p class="text-caption-hand" style="margin: 0 auto; max-width: 500px; line-height: 2; font-family: 'Caveat', cursive; font-size: 22px; color: var(--soil);">
        "森林不在乎你走多快，也不在乎你有没有目标。<br />它只是在那里，等你来。"
      </p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-leaves">🌱 🌿 🍃 🌾 🌿 🌱</div>
    <p class="text-small" style="margin: 0; opacity: 0.6;">
      一起去森林浴吧～ · 随时开始，即刻放松
    </p>
  </footer>

  <script src="../data.js"></script>

  <script>
    // 页面内局部数据
    const BEGINNER_TIPS = [
      { icon: "🕐", text: "从 20 分钟开始，不需要全天候" },
      { icon: "📵", text: "手机调静音，或放包里" },
      { icon: "☁️", text: "阴天和雨后效果更好" },
      { icon: "🌡️", text: "舒适温度：15–25°C 最理想" },
    ];

    // 1. 渲染漫步指南列表 (GUIDE_ITEMS 来源于 ../data.js)
    const guideListContainer = document.getElementById('guide-list');
    guideListContainer.innerHTML = GUIDE_ITEMS.map(item => `
      <div class="guide-card">
        <div class="num-badge">${item.id}</div>
        <div style="flex: 1; min-width: 0;">
          <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap;">
            <h3 class="text-medium" style="margin: 0;">${item.title}</h3>
            <span class="text-caption-hand" style="color: var(--soil); opacity: 0.8;">${item.subtitle}</span>
          </div>
          <p class="text-body" style="margin: 0 0 10px;">${item.description}</p>
          <span style="display: inline-flex; align-items: center; gap: 6px; background: var(--fg-light); border-radius: 20px; padding: 4px 14px; font-family: 'Caveat', cursive; font-size: 16px; color: var(--fg);">
            💡 ${item.tip}
          </span>
        </div>
        <div class="guide-icon-box">${item.icon}</div>
      </div>
    `).join('');

    // 2. 渲染新手注意事项
    const beginnerTipsContainer = document.getElementById('beginner-tips-list');
    beginnerTipsContainer.innerHTML = BEGINNER_TIPS.map(tip => `
      <div class="hand-card" style="padding: 20px 22px; display: flex; gap: 14px; align-items: flex-start;">
        <span style="font-size: 26px; line-height: 1.2;">${tip.icon}</span>
        <p class="text-body" style="margin: 0; line-height: 1.6;">
          ${tip.text}
        </p>
      </div>
    `).join('');
    // ==========================================
    // 全局主题同步逻辑 (无背景大图版)
    // ==========================================
    const themeClasses = ['theme-spring', 'theme-summer', 'theme-autumn', 'theme-winter'];
    const toggleContainer = document.getElementById('season-toggle-container');

    function renderTheme(idx) {
      // 1. 保存选择
      localStorage.setItem('forest-theme', idx);
      
      // 2. 切换 Body 类名
      document.body.classList.remove(...themeClasses);
      document.body.classList.add(themeClasses[idx]);
      
      // 3. 重新渲染按钮高亮状态
      if (toggleContainer) {
        toggleContainer.innerHTML = SEASONS.map((s, i) => `
          <button class="season-btn ${i === idx ? 'active' : ''}" onclick="renderTheme(${i})" style="cursor: pointer;">
            <span style="font-size: 20px;">${s.icon}</span>
          </button>
        `).join('');
      }
    }

    // 初始化读取本地缓存主题
    const currentThemeIdx = localStorage.getItem('forest-theme') ? parseInt(localStorage.getItem('forest-theme')) : 0;
    renderTheme(currentThemeIdx);
  </script>
</body>
</html>
