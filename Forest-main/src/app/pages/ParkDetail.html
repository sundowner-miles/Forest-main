<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公园详情 - 一起去森林浴吧</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="preconnect" href="https://gs.jurieo.com/gemini/fonts-googleapis">
  <link rel="preconnect" href="https://gs.jurieo.com/gemini/fonts-gstatic" crossorigin>
  <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Caveat:wght@400..700&family=Gaegu:wght@300;400;700&family=Nunito:wght@400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <script>
    // 抢在页面渲染前，提前把主题 class 加到 html 或 body 上，彻底消除闪烁
    (function() {
      const themeClasses = ['theme-spring', 'theme-summer', 'theme-autumn', 'theme-winter'];
      const savedThemeIdx = localStorage.getItem('forest-theme') ? parseInt(localStorage.getItem('forest-theme')) : 0;
      // 直接把 class 塞给最外层的 <html> 节点
      document.documentElement.className = themeClasses[savedThemeIdx];
    })();
  </script>
</head>
<body style="margin: 0; padding: 0; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column;">

<nav class="navbar" style="background: rgba(253, 251, 247, 0.75); backdrop-filter: blur(10px);">
  <a href="Home.html" class="navbar-logo">
    <!-- 删掉🌿表情，换成自定义图片 -->
    <img src="../imgs/logo1.png" class="navbar-logo-icon" alt="logo">
    一起去森林浴吧～
  </a>

  <div class="navbar-actions">
    <ul class="navbar-links">
      <li><a href="Home.html" class="nav-link">首页</a></li>
      <li><a href="Guide.html" class="nav-link">怎么逛</a></li>
      <li><a href="Random.html" class="nav-link">随机逛</a></li>
      <li><a href="MapPage.html" class="nav-link active">去哪儿逛</a></li>
    </ul>

    <div class="navbar-season" title="轻轻拨动季节">
      <div class="season-toggle" id="season-toggle-container"></div>
    </div>

    <div class="navbar-tag">🌳 今日宜·发呆</div>
    <button class="navbar-mobile-btn" onclick="toggleMobileMenu()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </div>
</nav>

  <div id="app-container" style="flex: 1;">
    </div>

  <footer class="site-footer">
    <div class="footer-leaves">🌱 🌿 🍃 🌾 🌿 🌱</div>
    <p class="text-small" style="margin: 0; opacity: 0.6;">
      一起去森林浴吧～ · 随时开始，即刻放松
    </p>
  </footer>

  <script src="../data.js"></script>

  <script>
    // 1. 获取 URL 中的 ID 参数
    const urlParams = new URLSearchParams(window.location.search);
    const parkId = parseInt(urlParams.get('id'));
    const park = PARKS.find(p => p.id === parkId);

    // 2. 状态变量
    let localNotes = []; // 本地新增的留言
    let showForm = false; // 是否显示表单
    let submitted = false; // 是否显示提交成功状态

    // 3. 核心渲染函数
    function renderApp() {
      const container = document.getElementById('app-container');

      // 404 Not Found 状态
      if (!park) {
        container.innerHTML = `
          <div style="min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;">
            <div style="font-size: 64px; margin-bottom: 20px;">🌿</div>
            <h2 class="text-large">找不到这座公园了…</h2>
            <p class="text-body" style="opacity: 0.7;">也许它躲进了更深的森林里</p>
            <button class="btn-primary" style="margin-top: 24px;" onclick="window.location.href='MapPage.html'">
              ← 回到地图
            </button>
          </div>
        `;
        return;
      }

      // 合并原始留言和本地新增的留言
      const allNotes = [...park.tips, ...localNotes];

      // 生成便签 HTML
      const notesHtml = allNotes.map(note => `
        <div class="sticky-note" style="transform: rotate(${note.rotation}deg)">
          <span class="sticky-pin">📌</span>
          <p style="margin: 8px 0 0; line-height: 1.55;">${note.emoji} ${note.text}</p>
          <span class="sticky-user">— ${note.nickname} · ${note.date}</span>
        </div>
      `).join('');

      // 特性标签 HTML
      const featuresHtml = park.features.map(f => `<span class="feature-tag">${f}</span>`).join('');

      // 静态提示小贴士
      const staticTipsHtml = [
        ["☀️", "清晨 6–8 点氧气最充沛，也最安静"],
        ["🌧️", "雨后来，空气中负离子浓度是平时的 3 倍"],
        ["🎧", "建议不戴耳机，用身体感受"],
        ["⏱️", "最少待 20 分钟，效果才会显现"],
      ].map(([icon, tip]) => `
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="font-size: 18px; line-height: 1.3;">${icon}</span>
          <span class="text-body" style="margin: 0;">${tip}</span>
        </div>
      `).join('');

      // 表单 HTML 逻辑
      let formHtml = '';
      if (!showForm) {
        formHtml = `
          <button class="btn-secondary" style="margin-top: 8px;" onclick="toggleForm(true)">
            📌 添加我的小发现
          </button>
        `;
      } else {
        if (submitted) {
          formHtml = `
            <div class="inline-form">
              <div style="text-align: center; padding: 24px 0;">
                <div style="font-size: 48px; margin-bottom: 12px;">🌿</div>
                <p class="text-caption-hand" style="margin: 0;">谢谢！你的发现已经贴上去啦～</p>
              </div>
            </div>
          `;
        } else {
          formHtml = `
            <div class="inline-form">
              <h3 class="text-medium" style="margin: 0 0 6px;">📌 留下你的发现</h3>
              <p class="text-small" style="margin: 0 0 20px; opacity: 0.7;">一句话就够，让下一个来这里的人感受到</p>
              <form onsubmit="handleSubmitTip(event)">
                <div class="form-group">
                  <label class="form-label">昵称</label>
                  <input id="tip-nickname" class="form-input" type="text" placeholder="树洞居民 / 云朵 ..." required />
                </div>
                <div class="form-group">
                  <label class="form-label">你的小发现</label>
                  <textarea id="tip-text" class="form-input" rows="3" placeholder="西门的那棵老银杏，秋天落叶时超美..." required></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                  <button class="btn-primary" type="submit">🌱 贴上去</button>
                  <button class="btn-secondary" type="button" onclick="toggleForm(false)">取消</button>
                </div>
              </form>
            </div>
          `;
        }
      }

      // 拼装完整页面
      container.innerHTML = `
        <div class="page-container">
          <div style="padding-top: 32px;">
            <button class="back-link" onclick="window.location.href='MapPage.html'" style="background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; color: var(--soil); font-size: 15px; font-weight: 700; margin-bottom: 8px;">
              ← 返回地图
            </button>
          </div>

          <div class="park-detail-grid">
            <div>
              <div class="hand-card" style="padding: 0; overflow: hidden;">
                <img src="${park.image}" alt="${park.name}" style="width: 100%; height: 220px; object-fit: cover; display: block; border-radius: 22px 6px 0 0;" />
                
                <div style="padding: 22px 22px 24px;">
                  <div style="background: var(--yellow); display: inline-flex; align-items: center; gap: 4px; border-radius: 16px; padding: 4px 12px; font-family: 'Quicksand', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px;">
                    ${park.seasonIcon} ${park.bestSeason}
                  </div>
                  
                  <h1 class="text-large" style="margin: 0 0 6px;">${park.name}</h1>
                  <p class="text-caption-hand" style="margin: 0 0 18px; color: var(--soil); opacity: 0.8;">${park.subtitle}</p>
                  <p class="text-body" style="margin: 0 0 20px; line-height: 1.75;">${park.description}</p>
                  
                  <div style="border-top: 1.5px dashed var(--soil-faint); padding-top: 16px; display: flex; flex-direction: column; gap: 10px;">
                    <div class="park-meta-row">
                      <span class="park-meta-icon">⏰</span>
                      <span class="text-body" style="margin: 0;">${park.openHours}</span>
                    </div>
                    <div class="park-meta-row">
                      <span class="park-meta-icon">📍</span>
                      <span class="text-body" style="margin: 0;">距你约 ${park.distance}</span>
                    </div>
                    <div class="park-meta-row">
                      <span class="park-meta-icon">🌡️</span>
                      <span class="text-body" style="margin: 0;">15–25°C 最宜漫步</span>
                    </div>
                  </div>

                  <div style="margin-top: 16px; display: flex; flex-wrap: wrap; gap: 4px;">
                    ${featuresHtml}
                  </div>

                  <button class="btn-primary" style="width: 100%; justify-content: center; margin-top: 20px;" onclick="window.open('https://maps.google.com?q=$${encodeURIComponent(park.name)}', '_blank')">
                    🗺️ 查看路线
                  </button>
                </div>
              </div>
            </div>

            <div>
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                <h2 class="text-large" style="margin: 0;">大家的疗愈小本本</h2>
                <span style="font-size: 24px;">📒</span>
              </div>
              <p class="text-body" style="margin: 0 0 24px; opacity: 0.75;">来过这里的人，留下了自己的发现</p>
              
              <div class="sticky-grid">
                ${notesHtml}
              </div>

              ${formHtml}

              <div class="hand-card" style="margin-top: 32px; background: linear-gradient(135deg, rgba(91,140,116,0.06) 0%, rgba(247,227,175,0.15) 100%);">
                <h4 class="text-medium" style="margin: 0 0 14px;">🌿 森林浴小贴士</h4>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                  ${staticTipsHtml}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // 4. 事件处理函数
    window.toggleForm = function(show) {
      showForm = show;
      renderApp();
    };

    window.handleSubmitTip = function(e) {
      e.preventDefault();
      
      const nicknameInput = document.getElementById('tip-nickname');
      const textInput = document.getElementById('tip-text');
      
      const nickname = nicknameInput.value.trim();
      const text = textInput.value.trim();

      if (!nickname || !text) return;

      const newNote = {
        id: Date.now(),
        nickname: nickname,
        text: text,
        emoji: "🌿",
        rotation: (Math.random() * 4 - 2), // 生成 -2 到 2 之间的随机旋转角度
        date: "刚刚"
      };

      // 插入到数组开头，显示在最前面
      localNotes.unshift(newNote);
      submitted = true;
      
      // 触发重绘：显示成功提示
      renderApp();

      // 1.5秒后自动关闭提示并恢复原状
      setTimeout(() => {
        submitted = false;
        showForm = false;
        renderApp();
      }, 1500);
    };

    // 初始化渲染页面
    renderApp();
    // ==========================================
    // 全局主题同步逻辑 (无背景大图版)
    // ==========================================
    const themeClasses = ['theme-spring', 'theme-summer', 'theme-autumn', 'theme-winter'];
    const toggleContainer = document.getElementById('season-toggle-container');

    function renderTheme(idx) {
      // 1. 保存选择
      localStorage.setItem('forest-theme', idx);
      
      // 2. 切换 Body 类名
      document.body.classList.remove(...themeClasses);
      document.body.classList.add(themeClasses[idx]);
      
      // 3. 重新渲染按钮高亮状态
      if (toggleContainer) {
        toggleContainer.innerHTML = SEASONS.map((s, i) => `
          <button class="season-btn ${i === idx ? 'active' : ''}" onclick="renderTheme(${i})" style="cursor: pointer;">
            <img src="${s.icon}" alt="${s.label}" style="width: 24px; height: 24px; object-fit: contain;">
          </button>
        `).join('');
      }
    }

    // 初始化读取本地缓存主题
    const currentThemeIdx = localStorage.getItem('forest-theme') ? parseInt(localStorage.getItem('forest-theme')) : 0;
    renderTheme(currentThemeIdx);
  </script>
</body>
</html>
